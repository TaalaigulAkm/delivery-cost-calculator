<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delivery Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="calculator">

        <h1>Калькулятор доставки</h1>

        <label>Материал</label>
        <select id="material">
            <option value="">Выберите материал</option>
            <option value="10">Песок</option>
            <option value="15">Щебень</option>
            <option value="20">Гравий</option>
        </select>

        <label>Цена материала за единицу</label>
        <input type="number" id="price">

        <label>Объем материала</label>
        <input type="number" id="volume">

        <label>Тариф доставки</label>
        <input type="number" id="delivery">

        <label>Дополнительный тариф</label>
        <input type="number" id="extra">

        <button id="calculate">Расчитать</button>
        <button id="clear">Очистить</button>

        <h2>Итог: <span id="result">0</span></h2>

    </div>

    <script src="script.js"></script>
</body>
</html>
